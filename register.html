<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="form-bg">
  <div class="container">
    <div class="form-box shadow-lg">
      <div class="brand-header text-center mb-4">
        <span class="brand-badge">Task2</span>
        <h2 class="fw-bold">Create your Task2 account</h2>
        <p class="text-muted">Register and join the productivity workspace.</p>
      </div>

      <form id="registerForm" class="row g-3">
        <div class="col-12">
          <label for="username" class="form-label">Username</label>
          <input id="username" type="text" class="form-control input-soft" placeholder="Choose a username" required>
          <div id="userMsg" class="form-text text-end text-secondary">Username availability updates in real time.</div>
        </div>

        <div class="col-12">
          <label for="email" class="form-label">Email address</label>
          <input id="email" type="email" class="form-control input-soft" placeholder="name@example.com" required>
        </div>

        <div class="col-12 position-relative">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-control input-soft" placeholder="Create a password" required>
          <button type="button" class="show-hide" onclick="togglePassword('password')">Show</button>
        </div>

        <div class="col-12 position-relative">
          <label for="confirmPassword" class="form-label">Confirm password</label>
          <input id="confirmPassword" type="password" class="form-control input-soft" placeholder="Confirm password" required>
          <button type="button" class="show-hide" onclick="togglePassword('confirmPassword')">Show</button>
        </div>

        <div class="col-12">
          <div id="message" class="small text-muted"></div>
        </div>

        <div class="col-12">
          <button class="btn custom-btn w-100">Create account</button>
        </div>

        <div class="col-12 text-center small text-muted">
          Already registered? <a href="login.html">Sign in instead</a>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
