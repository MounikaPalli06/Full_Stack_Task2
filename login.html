<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="form-bg">
  <div class="container">
    <div class="form-box shadow-lg">
      <div class="brand-header text-center mb-4">
        <span class="brand-badge">Task2</span>
        <h2 class="fw-bold">Sign in to Task2 Hub</h2>
        <p class="text-muted">Secure access to your dashboard and project tools.</p>
      </div>

      <form id="loginForm" class="row g-3">
        <div class="col-12">
          <label for="loginEmail" class="form-label">Email address</label>
          <input id="loginEmail" type="email" class="form-control input-soft" placeholder="name@example.com" required>
        </div>

        <div class="col-12 position-relative">
          <label for="loginPassword" class="form-label">Password</label>
          <input id="loginPassword" type="password" class="form-control input-soft" placeholder="••••••••" required>
          <button type="button" class="show-hide" onclick="togglePassword('loginPassword')">Show</button>
        </div>

        <div class="col-12 d-flex justify-content-between align-items-center">
          <div class="form-check">
            <input id="rememberMe" class="form-check-input" type="checkbox">
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a class="text-primary small" href="#">Forgot password?</a>
        </div>

        <div class="col-12">
          <button class="btn custom-btn w-100">Continue</button>
        </div>

        <div class="col-12 text-center small text-muted">
          New to Task2? <a href="register.html">Create an account</a>
        </div>
      </form>

      <div id="successMessage" class="alert alert-success text-center d-none mt-4">Welcome back! Redirecting...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
